<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Affiche Promo Livreur</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #333;
            min-height: 100vh;
        }
        .poster {
            width: 1080px;
            height: 1080px;
            background-image: url('file:///C:/Users/HP/.gemini/antigravity-ide/brain/eee1053f-2673-4561-8159-10b3073a92c1/promo_livreur_v3_1780486381140.png');
            background-size: cover;
            background-position: center;
            position: relative;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .glass-overlay {
            width: 90%;
            margin-bottom: 5%;
            background: rgba(255, 255, 255, 0.45);
            border: 2px solid rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(35px) saturate(180%);
            -webkit-backdrop-filter: blur(35px) saturate(180%);
            border-radius: 30px;
            padding: 50px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 24px 70px rgba(54, 42, 33, 0.12), inset 0 1px 2.5px rgba(255, 255, 255, 0.95);
        }
        .title {
            font-size: 110px;
            font-weight: 800;
            color: #E85C4A; /* Primary Red for maximum attention */
            margin: 0 0 15px 0;
            line-height: 1;
            text-shadow: 0 4px 15px rgba(255,255,255,0.9);
            text-transform: uppercase;
        }
        .subtitle {
            font-size: 45px;
            font-weight: 800;
            color: #FFFFFF;
            background-color: #27AE60; /* Primary Green as background for max legibility */
            padding: 15px 40px;
            border-radius: 50px;
            margin: 0 0 40px 0;
            line-height: 1.3;
            box-shadow: 0 10px 20px rgba(39, 174, 96, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .qr-container {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .qr-container img {
            display: block;
            width: 250px;
            height: 250px;
        }
        .website {
            font-size: 35px;
            font-weight: 600;
            color: #8D5537; /* Primary Brown */
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="poster">
        <div class="glass-overlay">
            <h1 class="title">Tu es livreur ?</h1>
            <h2 class="subtitle">Viens t'enregistrer pour avoir<br>plus de commandes</h2>
            <div class="qr-container">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://livraisonrapide.app" alt="QR Code">
            </div>
            <div class="website">LIVRAISONRAPIDE.APP</div>
        </div>
    </div>
</body>
</html>
